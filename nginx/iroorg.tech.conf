# IRO - iroorg.tech
# Copy to /etc/nginx/sites-available/iroorg.tech
# Then: ln -sf /etc/nginx/sites-available/iroorg.tech /etc/nginx/sites-enabled/
#       nginx -t && systemctl reload nginx
#       certbot --nginx -d iroorg.tech -d www.iroorg.tech

server {
    listen 80;
    server_name iroorg.tech www.iroorg.tech;
    
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
    
    location /api {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
